<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Berburu Matematika - Math Spear Hunter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #001f3f; /* Deep sea blue fallback */
            font-family: 'Nunito', sans-serif;
            touch-action: none; /* Prevent zooming/scrolling on mobile */
        }
        .font-cartoon {
            font-family: 'Fredoka One', cursive;
        }
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        /* Custom UI overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
        }
        .interactive {
            pointer-events: auto;
        }
        
        /* Floating animation for menu elements */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        /* Screen Shake effect */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shake-screen {
            animation: shake 0.5s;
        }
    </style>
</head>
<body>

    <!-- Canvas for Game Rendering -->
    <canvas id="gameCanvas"></canvas>

    <!-- UI Overlay container -->
    <div id="uiLayer" class="overlay">
        
        <!-- Main Menu -->
        <div id="startScreen" class="absolute inset-0 flex flex-col items-center justify-center bg-blue-900/80 backdrop-blur-sm interactive transition-opacity duration-300">
            <h1 class="font-cartoon text-5xl md:text-7xl text-yellow-400 drop-shadow-[0_5px_5px_rgba(0,0,0,0.8)] mb-4 text-center animate-float">
                BERBURU<br>MATEMATIKA
            </h1>
            <p class="text-white text-lg md:text-xl mb-8 font-bold text-center max-w-md px-4 shadow-black drop-shadow-md">
                Selesaikan soal dengan menombak ikan yang membawa jawaban benar!
            </p>
            <button id="startBtn" class="font-cartoon bg-green-500 hover:bg-green-400 text-white text-3xl py-4 px-10 rounded-full shadow-[0_8px_0_#166534] active:shadow-[0_0px_0_#166534] active:translate-y-2 transition-all">
                MAIN SEKARANG
            </button>
        </div>

        <!-- In-Game HUD -->
        <div id="gameHUD" class="hidden absolute inset-0 flex flex-col justify-between p-4 pointer-events-none">
            <!-- Top Bar: Stats -->
            <div class="flex justify-between items-start w-full max-w-4xl mx-auto">
                <!-- Score & Combo -->
                <div class="bg-blue-800/70 border-4 border-blue-400 rounded-2xl p-2 md:p-4 text-white shadow-lg backdrop-blur-md">
                    <div class="font-cartoon text-xl md:text-3xl text-yellow-300">Skor: <span id="scoreVal">0</span></div>
                    <div id="comboContainer" class="hidden text-orange-400 font-bold text-sm md:text-lg animate-pulse">
                        Combo x<span id="comboVal">1</span>!
                    </div>
                </div>

                <!-- Math Problem -->
                <div class="flex-1 flex justify-center mx-2">
                    <div class="bg-white/90 border-4 border-yellow-400 rounded-3xl py-3 px-6 md:py-4 md:px-10 shadow-[0_10px_0_rgba(0,0,0,0.2)] text-center relative overflow-hidden">
                        <!-- Timer Bar -->
                        <div id="timerBar" class="absolute bottom-0 left-0 h-2 bg-red-500 w-full transition-all duration-100 linear"></div>
                        <h2 class="font-cartoon text-4xl md:text-6xl text-blue-900 drop-shadow-sm" id="mathProblem">?</h2>
                    </div>
                </div>

                <!-- Lives -->
                <div class="bg-blue-800/70 border-4 border-blue-400 rounded-2xl p-2 md:p-3 text-white shadow-lg flex gap-1 backdrop-blur-md">
                    <svg class="w-8 h-8 md:w-10 md:h-10 text-red-500 heart-icon" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"></path></svg>
                    <svg class="w-8 h-8 md:w-10 md:h-10 text-red-500 heart-icon" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"></path></svg>
                    <svg class="w-8 h-8 md:w-10 md:h-10 text-red-500 heart-icon" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"></path></svg>
                </div>
            </div>
            
            <!-- Combo Text Popup Center -->
            <div id="actionText" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 font-cartoon text-5xl md:text-7xl text-green-400 drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)] opacity-0 transition-opacity duration-200">
                Luar Biasa!
            </div>

            <!-- Bottom Note -->
            <div class="w-full text-center text-white/50 text-sm md:text-base font-bold pb-2">
                Tap/Klik di layar untuk menembak tombak!
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="gameOverScreen" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-black/80 backdrop-blur-md interactive">
            <h1 class="font-cartoon text-6xl md:text-8xl text-red-500 drop-shadow-[0_5px_5px_rgba(0,0,0,0.8)] mb-2 animate-float">
                GAME OVER
            </h1>
            <p class="text-white text-2xl font-bold mb-2">Skor Akhir: <span id="finalScore" class="text-yellow-400 text-4xl">0</span></p>
            <p id="highScoreText" class="text-green-400 text-xl font-bold mb-8 hidden">Skor Tertinggi Baru!</p>
            
            <button id="restartBtn" class="font-cartoon bg-blue-500 hover:bg-blue-400 text-white text-2xl py-3 px-8 rounded-full shadow-[0_6px_0_#1e3a8a] active:shadow-[0_0px_0_#1e3a8a] active:translate-y-2 transition-all">
                MAIN LAGI
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // UI Elements
        const startScreen = document.getElementById('startScreen');
        const gameHUD = document.getElementById('gameHUD');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const scoreVal = document.getElementById('scoreVal');
        const comboContainer = document.getElementById('comboContainer');
        const comboVal = document.getElementById('comboVal');
        const mathProblemDisplay = document.getElementById('mathProblem');
        const timerBar = document.getElementById('timerBar');
        const heartIcons = document.querySelectorAll('.heart-icon');
        const finalScoreDisplay = document.getElementById('finalScore');
        const actionText = document.getElementById('actionText');
        const highScoreText = document.getElementById('highScoreText');

        // Game State
        let gameState = 'START'; // START, PLAYING, GAMEOVER
        let score = 0;
        let lives = 3;
        let combo = 0;
        let highScore = localStorage.getItem('mathHunterHighScore') || 0;
        
        let difficulty = 1; // 1: Easy, 2: Med, 3: Hard
        let currentProblem = { text: "", answer: 0 };
        let questionTimer = 0;
        const QUESTION_TIME_LIMIT = 600; // frames (~10 seconds at 60fps)

        // Mouse/Touch tracking
        let pointerX = window.innerWidth / 2;
        let pointerY = window.innerHeight / 2;
        let isShooting = false;

        // Resize Canvas
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Simple Audio Synth (Web Audio API) to avoid missing files
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'shoot') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); // E5
                osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2); // G5
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'gameover') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 1);
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1);
                osc.start();
                osc.stop(audioCtx.currentTime + 1);
            }
        }

        function generateMathProblem() {
            let num1, num2, operator, answer;
            
            // Adjust difficulty based on score
            if (score < 100) difficulty = 1;      // Easy (+, -)
            else if (score < 300) difficulty = 2; // Medium (+, -, *)
            else difficulty = 3;                  // Hard (all ops)

            if (difficulty === 1) {
                operator = Math.random() > 0.5 ? '+' : '-';
                if (operator === '+') {
                    num1 = Math.floor(Math.random() * 15) + 1;
                    num2 = Math.floor(Math.random() * 15) + 1;
                    answer = num1 + num2;
                } else {
                    num1 = Math.floor(Math.random() * 20) + 5;
                    num2 = Math.floor(Math.random() * num1); // Ensure positive result
                    answer = num1 - num2;
                }
            } else if (difficulty === 2) {
                const ops = ['+', '-', '*'];
                operator = ops[Math.floor(Math.random() * ops.length)];
                if (operator === '+') {
                    num1 = Math.floor(Math.random() * 30) + 10;
                    num2 = Math.floor(Math.random() * 30) + 10;
                    answer = num1 + num2;
                } else if (operator === '-') {
                    num1 = Math.floor(Math.random() * 50) + 20;
                    num2 = Math.floor(Math.random() * num1);
                    answer = num1 - num2;
                } else {
                    num1 = Math.floor(Math.random() * 10) + 2;
                    num2 = Math.floor(Math.random() * 10) + 2;
                    operator = '×';
                    answer = num1 * num2;
                }
            } else {
                const ops = ['+', '-', '*', '/'];
                operator = ops[Math.floor(Math.random() * ops.length)];
                if (operator === '*') {
                    num1 = Math.floor(Math.random() * 12) + 3;
                    num2 = Math.floor(Math.random() * 12) + 3;
                    operator = '×';
                    answer = num1 * num2;
                } else if (operator === '/') {
                    num2 = Math.floor(Math.random() * 10) + 2;
                    answer = Math.floor(Math.random() * 10) + 2;
                    num1 = num2 * answer;
                    operator = '÷';
                } else {
                    num1 = Math.floor(Math.random() * 100) + 20;
                    num2 = Math.floor(Math.random() * 50) + 10;
                    if(operator === '-'){
                        if(num2 > num1) { let t = num1; num1 = num2; num2 = t; }
                        answer = num1 - num2;
                    } else {
                        answer = num1 + num2;
                    }
                }
            }

            currentProblem = { text: `${num1} ${operator} ${num2} = ?`, answer: answer };
            mathProblemDisplay.innerText = currentProblem.text;
            questionTimer = QUESTION_TIME_LIMIT;
            
            // Clear existing fish and spawn new ones for new question
            fishes = [];
            spawnFishes();
        }

        // Generate wrong answers that are close to the correct one
        function generateWrongAnswer(correct) {
            let offset;
            do {
                offset = Math.floor(Math.random() * 9) - 4; // -4 to +4
            } while (offset === 0);
            
            let wrong = correct + offset;
            if (wrong < 0) wrong = Math.abs(wrong) + 1;
            return wrong;
        }

        
        // --- Bubbles for Background ---
        class Bubble {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 100;
                this.radius = Math.random() * 10 + 5;
                this.speed = Math.random() * 2 + 1;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = Math.random() * 0.05 + 0.01;
            }
            update() {
                this.y -= this.speed;
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * 1;
                if (this.y < -50) {
                    this.y = canvas.height + 50;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.lineWidth = 2;
                ctx.stroke();
                // Inner highlight
                ctx.beginPath();
                ctx.arc(this.x - this.radius*0.3, this.y - this.radius*0.3, this.radius*0.2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.fill();
            }
        }

        // --- Particles for Hit Effects ---
        class Particle {
            constructor(x, y, color, isText = false, text = "") {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 5 + 2;
                this.vx = Math.cos(angle) * velocity;
                this.vy = Math.sin(angle) * velocity;
                this.life = 1.0;
                this.decay = Math.random() * 0.02 + 0.02;
                this.size = Math.random() * 6 + 3;
                this.isText = isText;
                this.text = text;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                if(this.isText) {
                    this.vy -= 0.1; // Float up
                    this.vx *= 0.9;
                }
            }
            draw() {
                if(this.life <= 0) return;
                ctx.globalAlpha = this.life;
                if(this.isText) {
                    ctx.font = "bold 30px 'Fredoka One'";
                    ctx.fillStyle = this.color;
                    ctx.strokeStyle = 'black';
                    ctx.lineWidth = 3;
                    ctx.strokeText(this.text, this.x, this.y);
                    ctx.fillText(this.text, this.x, this.y);
                } else {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                }
                ctx.globalAlpha = 1.0;
            }
        }

        
        const fishColors = [
            { body: '#FF5733', fin: '#C70039' }, // Orange/Red
            { body: '#FFC300', fin: '#FF5733' }, // Yellow
            { body: '#33FF57', fin: '#15B036' }, // Green
            { body: '#33C4FF', fin: '#066B96' }, // Blue
            { body: '#9B59B6', fin: '#5B2C6F' }  // Purple
        ];

        class Fish {
            constructor(isCorrect) {
                this.isCorrect = isCorrect;
                this.number = isCorrect ? currentProblem.answer : generateWrongAnswer(currentProblem.answer);
                
                // Spawn properties
                this.direction = Math.random() > 0.5 ? 1 : -1; // 1: Left to Right, -1: Right to Left
                this.radius = 40;
                this.x = this.direction === 1 ? -this.radius * 2 : canvas.width + this.radius * 2;
                this.y = Math.random() * (canvas.height * 0.5) + (canvas.height * 0.2); // Top half mainly
                
                // Speed increases slightly with difficulty
                const baseSpeed = Math.random() * 1.5 + 1;
                this.speed = (baseSpeed + (difficulty * 0.5)) * this.direction;
                
                this.wobblePhase = Math.random() * Math.PI * 2;
                
                const colorPalette = fishColors[Math.floor(Math.random() * fishColors.length)];
                this.bodyColor = colorPalette.body;
                this.finColor = colorPalette.fin;
                this.markedForDeletion = false;
            }
            update() {
                this.x += this.speed;
                this.y += Math.sin(this.wobblePhase) * 1.5;
                this.wobblePhase += 0.05;

                // Remove if off screen
                if (this.direction === 1 && this.x > canvas.width + 100) this.markedForDeletion = true;
                if (this.direction === -1 && this.x < -100) this.markedForDeletion = true;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                if (this.direction === -1) ctx.scale(-1, 1); // Flip if going left

                // Tail
                ctx.fillStyle = this.finColor;
                ctx.beginPath();
                ctx.moveTo(-this.radius + 10, 0);
                ctx.lineTo(-this.radius - 20, -20);
                ctx.lineTo(-this.radius - 20, 20);
                ctx.fill();
                
                // Fins
                ctx.beginPath();
                ctx.moveTo(0, -this.radius + 5);
                ctx.lineTo(-15, -this.radius - 15);
                ctx.lineTo(10, -this.radius + 5);
                ctx.fill();

                // Body
                ctx.fillStyle = this.bodyColor;
                ctx.beginPath();
                ctx.ellipse(0, 0, this.radius, this.radius * 0.7, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.lineWidth = 3;
                ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                ctx.stroke();

                // Eye
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(this.radius * 0.5, -10, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(this.radius * 0.5 + 2, -10, 3, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();

                // Draw Text (Number) on body, keeping it upright regardless of direction
                ctx.fillStyle = 'white';
                ctx.font = "bold 28px 'Fredoka One'";
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.lineWidth = 4;
                ctx.strokeStyle = 'rgba(0,0,0,0.6)';
                ctx.strokeText(this.number, this.x, this.y);
                ctx.fillText(this.number, this.x, this.y);
            }
        }

        class Harpoon {
            constructor(x, y, targetX, targetY) {
                this.x = x;
                this.y = y;
                this.speed = 15;
                const angle = Math.atan2(targetY - y, targetX - x);
                this.vx = Math.cos(angle) * this.speed;
                this.vy = Math.sin(angle) * this.speed;
                this.angle = angle;
                this.active = true;
                this.length = 60;
                playSound('shoot');
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                
                // Out of bounds
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.active = false;
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // Line (Rope)
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(-this.length * 2, 0); // visually connect to player roughly
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Shaft
                ctx.beginPath();
                ctx.moveTo(-this.length, 0);
                ctx.lineTo(0, 0);
                ctx.strokeStyle = '#a3a3a3';
                ctx.lineWidth = 4;
                ctx.stroke();

                // Tip
                ctx.fillStyle = '#f1f5f9';
                ctx.beginPath();
                ctx.moveTo(0, -4);
                ctx.lineTo(15, 0);
                ctx.lineTo(0, 4);
                ctx.fill();

                // Barbs
                ctx.beginPath();
                ctx.moveTo(5, -2);
                ctx.lineTo(-5, -10);
                ctx.moveTo(5, 2);
                ctx.lineTo(-5, 10);
                ctx.strokeStyle = '#f1f5f9';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.restore();
            }
        }

        class Player {
            constructor() {
                this.x = canvas.width / 2;
                this.y = canvas.height - 80;
                this.radius = 40;
                this.angle = -Math.PI / 2; // Pointing up default
            }
            update() {
                this.x = canvas.width / 2;
                this.y = canvas.height - 80;
                // Calculate angle to pointer
                this.angle = Math.atan2(pointerY - this.y, pointerX - this.x);
                
                // Clamp angle so player doesn't shoot backwards/downwards
                if (this.angle > 0) {
                    if (this.angle < Math.PI / 2) this.angle = -0.1;
                    else this.angle = -Math.PI + 0.1;
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                // Body (Diver suit)
                ctx.fillStyle = '#FF4136'; // Red suit
                ctx.beginPath();
                ctx.ellipse(0, 20, 35, 45, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Oxygen tank
                ctx.fillStyle = '#0074D9';
                ctx.fillRect(-20, -10, 40, 60);
                ctx.strokeStyle = '#001f3f';
                ctx.lineWidth = 2;
                ctx.strokeRect(-20, -10, 40, 60);

                // Head
                ctx.fillStyle = '#FFDC00'; // Yellow helmet
                ctx.beginPath();
                ctx.arc(0, -20, 30, 0, Math.PI * 2);
                ctx.fill();
                
                // Mask/Visor
                ctx.fillStyle = '#7FDBFF';
                ctx.beginPath();
                ctx.ellipse(0, -20, 20, 12, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#111';
                ctx.lineWidth = 3;
                ctx.stroke();

                // Rotate for arms/gun based on aim
                ctx.save();
                ctx.rotate(this.angle);
                
                // Arms holding gun
                ctx.fillStyle = '#FF4136';
                ctx.beginPath();
                ctx.ellipse(20, -10, 25, 8, 0, 0, Math.PI*2);
                ctx.ellipse(20, 10, 25, 8, 0, 0, Math.PI*2);
                ctx.fill();

                // Spear Gun
                ctx.fillStyle = '#333';
                ctx.fillRect(10, -5, 50, 10); // Main barrel
                ctx.fillStyle = '#666';
                ctx.fillRect(60, -8, 5, 16); // Muzzle
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(15, 5, 10, 15); // Handle
                
                ctx.restore(); // End gun rotation
                
                // Bubbles from mask
                if (Math.random() < 0.1) {
                    backgroundBubbles.push(new Bubble());
                    backgroundBubbles[backgroundBubbles.length-1].x = this.x + (Math.random()*20-10);
                    backgroundBubbles[backgroundBubbles.length-1].y = this.y - 30;
                    backgroundBubbles[backgroundBubbles.length-1].radius = Math.random() * 4 + 2;
                }

                ctx.restore();
            }
        }

        let player = new Player();
        let harpoons = [];
        let fishes = [];
        let backgroundBubbles = [];
        let particles = [];
        
        // Populate initial background bubbles
        for(let i=0; i<30; i++) backgroundBubbles.push(new Bubble());

        function spawnFishes() {
            fishes = [];
            let totalFishes = difficulty === 1 ? 3 : (difficulty === 2 ? 4 : 5);
            let correctIndex = Math.floor(Math.random() * totalFishes);
            
            for(let i=0; i<totalFishes; i++) {
                // Stagger spawn times visually by spacing their X coordinates
                let fish = new Fish(i === correctIndex);
                if (fish.direction === 1) fish.x -= i * 150;
                else fish.x += i * 150;
                
                // Avoid overlapping Y
                fish.y = (canvas.height * 0.2) + (i * ((canvas.height * 0.4) / totalFishes));
                
                fishes.push(fish);
            }
        }

        function createExplosion(x, y, color, isCorrect, text="") {
            for(let i=0; i<15; i++) {
                particles.push(new Particle(x, y, color));
                particles.push(new Particle(x, y, 'white')); // bubble splash
            }
            if(text) {
                particles.push(new Particle(x, y, isCorrect ? '#4ade80' : '#f87171', true, text));
            }
        }

        function showActionText(text, colorClass) {
            actionText.innerText = text;
            actionText.className = `absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 font-cartoon text-5xl md:text-7xl drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)] transition-all duration-300 scale-50 ${colorClass}`;
            
            // Trigger reflow to restart animation
            void actionText.offsetWidth; 
            
            actionText.classList.remove('scale-50', 'opacity-0');
            actionText.classList.add('scale-110', 'opacity-100');
            
            setTimeout(() => {
                actionText.classList.remove('scale-110', 'opacity-100');
                actionText.classList.add('scale-100', 'opacity-0');
            }, 1000);
        }

        function updateLivesDisplay() {
            heartIcons.forEach((heart, index) => {
                if (index < lives) {
                    heart.classList.remove('text-gray-500');
                    heart.classList.add('text-red-500');
                } else {
                    heart.classList.remove('text-red-500');
                    heart.classList.add('text-gray-500');
                }
            });
        }

        function triggerError() {
            lives--;
            playSound('wrong');
            updateLivesDisplay();
            combo = 0;
            comboContainer.classList.add('hidden');
            document.body.classList.add('shake-screen');
            setTimeout(() => document.body.classList.remove('shake-screen'), 500);
            
            if (lives <= 0) {
                gameOver();
            } else {
                generateMathProblem(); // Get new problem if wrong
            }
        }

        function checkCollisions() {
            for (let i = harpoons.length - 1; i >= 0; i--) {
                let h = harpoons[i];
                for (let j = fishes.length - 1; j >= 0; j--) {
                    let f = fishes[j];
                    
                    // Simple circle collision
                    let dx = h.x - f.x;
                    let dy = h.y - f.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < f.radius + 10) { // Hit!
                        h.active = false; // Remove harpoon
                        f.markedForDeletion = true; // Remove fish
                        
                        if (f.isCorrect) {
                            // Correct!
                            combo++;
                            let points = 10 + (combo > 1 ? combo * 2 : 0);
                            score += points;
                            scoreVal.innerText = score;
                            playSound('correct');
                            createExplosion(f.x, f.y, f.bodyColor, true, `+${points}`);
                            
                            if (combo > 1) {
                                comboContainer.classList.remove('hidden');
                                comboVal.innerText = combo;
                                if(combo === 3) showActionText("Bagus!", "text-green-400");
                                if(combo === 5) showActionText("Hebat!", "text-yellow-400");
                                if(combo > 7) showActionText("Jenius!", "text-orange-500");
                            }
                            
                            // Immediately generate next problem
                            setTimeout(() => {
                                if(gameState === 'PLAYING') generateMathProblem();
                            }, 500);
                            
                        } else {
                            // Wrong!
                            createExplosion(f.x, f.y, f.bodyColor, false, "SALAH!");
                            triggerError();
                        }
                        break; // Stop checking this harpoon against other fishes
                    }
                }
            }
        }

        function drawBackground() {
            // Gradient Ocean
            let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#006994'); // Light blue top
            grad.addColorStop(1, '#001f3f'); // Dark blue bottom
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw some static corals/seaweed at bottom
            ctx.fillStyle = '#228B22';
            for(let i=0; i<5; i++) {
                ctx.beginPath();
                let bx = canvas.width * 0.2 * i + 50;
                let by = canvas.height;
                ctx.moveTo(bx, by);
                ctx.quadraticCurveTo(bx + 20, by - 50, bx, by - 100);
                ctx.quadraticCurveTo(bx - 20, by - 50, bx + 10, by);
                ctx.fill();
            }
        }

        function gameLoop() {
            if (gameState !== 'PLAYING') return;

            // Clear & Draw BG
            drawBackground();

            // Update & Draw Bubbles
            backgroundBubbles.forEach(b => {
                b.update();
                b.draw();
            });

            // Timer logic
            questionTimer--;
            let timePercent = (questionTimer / QUESTION_TIME_LIMIT) * 100;
            timerBar.style.width = `${timePercent}%`;
            
            if (timePercent < 25) timerBar.className = "absolute bottom-0 left-0 h-2 bg-red-500 transition-all duration-100 linear";
            else if (timePercent < 50) timerBar.className = "absolute bottom-0 left-0 h-2 bg-yellow-400 transition-all duration-100 linear";
            else timerBar.className = "absolute bottom-0 left-0 h-2 bg-green-500 transition-all duration-100 linear";

            if (questionTimer <= 0) {
                showActionText("Waktu Habis!", "text-red-500");
                triggerError();
            }

            // Check if correct fish swam away (missed opportunity, but no penalty, just respawn)
            let correctFish = fishes.find(f => f.isCorrect);
            if (!correctFish || correctFish.markedForDeletion) {
                // If the correct fish is gone (off screen or wrongly deleted), spawn new set
                // Only if harpoons aren't currently flying (to prevent despawn mid-shot)
                if(harpoons.length === 0 && fishes.filter(f => !f.markedForDeletion).length === 0) {
                    spawnFishes();
                }
            }

            // Update & Draw Fishes
            fishes.forEach(f => {
                f.update();
                f.draw();
            });
            fishes = fishes.filter(f => !f.markedForDeletion);

            // Update & Draw Harpoons
            harpoons.forEach(h => {
                h.update();
                h.draw();
            });
            harpoons = harpoons.filter(h => h.active);

            // Update & Draw Player
            player.update();
            player.draw();

            // Update & Draw Particles
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            particles = particles.filter(p => p.life > 0);

            checkCollisions();

            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            gameState = 'PLAYING';
            score = 0;
            lives = 3;
            combo = 0;
            difficulty = 1;
            scoreVal.innerText = score;
            comboContainer.classList.add('hidden');
            updateLivesDisplay();
            
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            gameHUD.classList.remove('hidden');
            highScoreText.classList.add('hidden');
            
            harpoons = [];
            particles = [];
            generateMathProblem();
            
            playSound('correct'); // start sound
            gameLoop();
        }

        function gameOver() {
            gameState = 'GAMEOVER';
            playSound('gameover');
            gameHUD.classList.add('hidden');
            gameOverScreen.classList.remove('hidden');
            finalScoreDisplay.innerText = score;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('mathHunterHighScore', highScore);
                highScoreText.classList.remove('hidden');
            }
        }

        // Input Handling
        function updatePointer(e) {
            if(e.touches) {
                pointerX = e.touches[0].clientX;
                pointerY = e.touches[0].clientY;
            } else {
                pointerX = e.clientX;
                pointerY = e.clientY;
            }
        }

        function handleShoot(e) {
            e.preventDefault(); // Prevent double firing on touch
            if (gameState !== 'PLAYING') return;
            
            updatePointer(e);
            
            // Limit fire rate - only 1 harpoon at a time for simplicity and challenge
            if (harpoons.length < 2) {
                harpoons.push(new Harpoon(player.x, player.y - 40, pointerX, pointerY));
            }
        }

        // Mouse Events
        window.addEventListener('mousemove', updatePointer);
        window.addEventListener('mousedown', handleShoot);

        // Touch Events
        window.addEventListener('touchmove', updatePointer, {passive: false});
        window.addEventListener('touchstart', handleShoot, {passive: false});

        // UI Buttons
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        // Initial draw for background before start
        drawBackground();
        player.x = canvas.width / 2;
        player.y = canvas.height - 80;
        player.draw();

    </script>
</body>
